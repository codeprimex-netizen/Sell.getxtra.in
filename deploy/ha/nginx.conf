# Load balancer for the stateless web tier (Req 17.1). Round-robins across web
# replicas; because sessions/cache are in Redis, no sticky sessions are needed.

events { worker_connections 1024; }

http {
    upstream app {
        least_conn;
        server web:9000;      # docker-compose resolves all `web` replicas
        keepalive 32;
    }

    # Long-lived immutable caching for fingerprinted static assets (Req 16.2).
    map $uri $asset_cache {
        default                              "off";
        "~*\.(css|js|woff2|png|jpg|svg)$"    "public, max-age=31536000, immutable";
    }

    server {
        listen 80;
        server_name code.getxtra.in www.code.getxtra.in;

        location /healthz { proxy_pass http://app; access_log off; }
        location /readyz  { proxy_pass http://app; access_log off; }

        location / {
            proxy_pass http://app;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control $asset_cache;
        }
    }
}
