# Horizontal autoscaling for spikes (Req 17.1/17.2). Web scales on CPU;
# workers scale on queue depth (custom metric) or CPU as a fallback.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sell-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sell-web
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sell-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sell-worker
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Pods
      pods:
        metric: { name: queue_depth }
        target: { type: AverageValue, averageValue: "200" }
