# ─────────────────────────────────────────────────────────────
# Code.getxtra.in — Local development stack
#   web   : Nginx  -> app (PHP-FPM)
#   app   : PHP-FPM front controller
#   worker: queue worker (async jobs — used from Phase 9)
#   mysql : primary database
#   redis : cache / session / queue
#   search: Meilisearch (discovery — used from Phase 4)
#   minio : S3-compatible object storage (uploads/downloads)
#   mail  : Mailhog (captured outbound email)
# ─────────────────────────────────────────────────────────────
services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/app:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - ./:/var/www/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["php", "bin/console", "queue:work"]
    env_file: .env
    volumes:
      - ./:/var/www/app
    depends_on:
      - app
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-getxtrain_Codegetxdata}
      MYSQL_USER: ${DB_USERNAME:-getxtrain_Codegetuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  search:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: ${SEARCH_KEY:-masterKey}
    ports:
      - "7700:7700"
    volumes:
      - search_data:/meili_data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mail:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
  search_data:
  minio_data:
