# Nginx site config for Code.getxtra.in — routes all traffic to the
# PHP-FPM front controller (public/index.php).

server {
    listen 80;
    server_name _;
    root /var/www/app/public;
    index index.php;

    client_max_body_size 105M;

    # Security headers (belt-and-suspenders with app middleware).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Serve static files directly; otherwise route to the front controller.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 60s;
    }

    # Deny access to hidden and sensitive files.
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
